<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Top 3 Netflix</title>
  </head>
  <body>
    <script>
      let nombre = prompt("¿Cuál es tu nombre?");

      let Pel1 = prompt("¿Cuál es tu top 1 película favorita de Netflix?");
      let Pel2 = prompt("¿Cuál es tu top 2 película favorita de Netflix?");
      let Pel3 = prompt("¿Cuál es tu top 3 película favorita de Netflix?");

      document.write("<h1>Top 3 películas de Netflix de " + nombre + ":</h1>");
      document.write("<ul>");
      document.write("<li>" + Pel1 + "</li>");
      document.write("<li>" + Pel2 + "</li>");
      document.write("<li>" + Pel3 + "</li>");
      document.write("</ul>");
    </script>
  </body>
</html>
