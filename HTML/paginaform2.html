<!doctype html>
<html lang="es">
  <head>
    <title>Prueba de Formulario Local</title>
  </head>
  <body>
    <h2>Regístrate para una sorpresa</h2>

    <form id="miFormulario">
      <label>Como te gusta que te digan: </label>
      <input
        type="text"
        name="campoNombre"
        placeholder="Tu nombre..."
        required
      />
    </br>
      <label>Tu correo: </label>
      <input
        type="password"
        name="campoCorreo"
        placeholder="Tu correo..."
        required
      />
  </br>
      <button type="submit">Enviar y ver magia</button>
    </form>

    <div id="resultado" style="margin-top: 20px; color: blue"></div>

    <script>
      const formulario = document.getElementById("miFormulario");
      const visor = document.getElementById("resultado");

      // Escuchamos el evento 'submit'
      formulario.addEventListener("submit", function (event) {
        // 1. EVITAMOS que la página se recargue (comportamiento por defecto)
        event.preventDefault();

        // 2. CAPTURAMOS los datos usando FormData
        const datos = new FormData(formulario);
        const nombre = datos.get("campoNombre"); // 'campoNombre' es el NAME del input

        // 3. MOSTRAMOS el resultado en el HTML
        visor.innerText = "El valor capturado es: " + nombre;

        console.log("Datos recibidos:", nombre);
      });
    </script>
  </body>
</html>
